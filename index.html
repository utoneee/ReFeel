<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>能量補給站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0d0a;
  --surface: #1a1610;
  --card: #211e18;
  --border: #2e2a22;
  --amber: #e8a030;
  --amber-dim: #7a5218;
  --amber-glow: rgba(232,160,48,0.12);
  --text: #f0e6d0;
  --text-muted: #8a7a62;
  --text-dim: #3a3428;
  --lock: #7eb8d4;
  --lock-bg: rgba(126,184,212,0.10);
  --lock-border: rgba(126,184,212,0.32);
}

html, body { height: 100%; margin: 0; padding: 0; background: #0f0d0a; }

/* ── App shell ── */
#app {
  position: relative;
  width: 100%;
  max-width: 480px;
  height: 100%;
  margin: 0 auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.hdr {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 1.1rem 0.6rem;
  border-bottom: 1px solid var(--border);
}
.hdr-logo { font-size: 0.82rem; letter-spacing: 0.2em; color: var(--amber); font-weight: 300; }
.hdr-actions { display: flex; gap: 0.2rem; }
.hdr-btn {
  background: none; border: none; color: var(--text-muted);
  font-size: 1rem; cursor: pointer; padding: 0.3rem 0.5rem;
  border-radius: 8px; transition: color 0.15s, background 0.15s;
  font-family: 'Noto Serif TC', serif; letter-spacing: 0;
}
.hdr-btn:active { color: var(--amber); background: var(--amber-glow); }
.hdr-btn.plus { font-size: 1.3rem; color: var(--amber); }

/* ══════════════════════════════
   MAIN GACHA AREA (flex:1, scrollable per slide)
══════════════════════════════ */
.gacha-viewport {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

.gacha-track {
  display: flex;
  height: 100%;
  /* width set by JS */
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  user-select: none;
}

.gacha-slide {
  flex-shrink: 0;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1rem 1rem 0.5rem;
  /* width set by JS */
}
.gacha-slide::-webkit-scrollbar { display: none; }

/* Machine SVG */
.machine-svg { width: 170px; flex-shrink: 0; }
.machine-svg svg { width: 100%; display: block; }

/* Capsule zone */
.cap-zone {
  width: 100%; min-height: 100px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin: 0.6rem 0;
}
.idle-hint { text-align: center; color: var(--text-dim); font-size: 0.8rem; line-height: 2; }

.capsule { width: 90px; height: 90px; position: relative; cursor: pointer; display: none; flex-shrink: 0; }
.capsule.show { display: block; }
.cap-t, .cap-b { width: 90px; height: 45px; position: absolute; transition: transform 0.38s ease; }
.cap-t { top: 0; border-radius: 45px 45px 0 0; }
.cap-b { bottom: 0; border-radius: 0 0 45px 45px; }
.capsule.pop .cap-t { transform: translateY(-32px) rotate(-10deg); }

@keyframes dropIn {
  0%   { opacity:0; transform:translateY(-50px) scale(0.6); }
  65%  { transform:translateY(6px) scale(1.05); opacity:1; }
  100% { transform:translateY(0) scale(1); }
}
.capsule.drop { animation: dropIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }

/* Result cards */
.result-quote {
  display: none; max-width: 280px; width: 100%;
  padding: 1.2rem 1.2rem 0.9rem; border-radius: 14px;
  border: 1px solid var(--border); background: var(--card); text-align: center;
}
.result-quote.show { display: block; animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1); }
.result-media {
  display: none; max-width: 280px; width: 100%;
  border-radius: 14px; overflow: hidden; border: 1px solid var(--border); background: var(--card);
}
.result-media.show { display: block; animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1); }
.result-media img { width: 100%; display: block; max-height: 220px; object-fit: cover; }
@keyframes popIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }

.qmark { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; line-height: 0.7; color: var(--amber-dim); display: block; margin-bottom: 0.4rem; }
.qtext { font-size: 0.96rem; line-height: 1.85; font-weight: 300; color: var(--text); margin-bottom: 0.45rem; }
.qsrc  { font-size: 0.72rem; color: var(--text-muted); font-style: italic; font-family: 'Cormorant Garamond', serif; }

.vlink { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem; text-decoration: none; color: inherit; }
.vthumb { width: 58px; height: 42px; border-radius: 7px; background: var(--border); flex-shrink: 0; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
.vthumb img { width: 100%; height: 100%; object-fit: cover; }
.vplay { position: absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.38); }
.vplay::after { content:''; width:0; height:0; border-style:solid; border-width:5px 0 5px 10px; border-color:transparent transparent transparent #fff; margin-left:2px; }
.vtitle { font-size:0.82rem; line-height:1.4; color:var(--text); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.vurl   { font-size:0.67rem; color:var(--amber); margin-top:0.18rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.tap-hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; display: none; margin-top: 0.2rem; }
.tap-hint.show { display: block; }

/* dot-row for loading */
.dot-row { display:flex; gap:4px; justify-content:center; margin:0.4rem 0; }
.dot-row span { width:5px; height:5px; border-radius:50%; background:var(--text-muted); animation:bounce 1.1s infinite; }
.dot-row span:nth-child(2){animation-delay:.18s}
.dot-row span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ══════════════════════════════
   CUSTOM DRAWER (above bottom bar)
══════════════════════════════ */
.custom-drawer {
  flex-shrink: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.28s ease, padding 0.28s ease;
  background: var(--surface);
  border-top: 1px solid transparent;
  padding: 0 1rem;
}
.custom-drawer.open {
  max-height: 120px;
  padding: 0.7rem 1rem;
  border-top-color: var(--border);
}
.drawer-section { margin-bottom: 0.5rem; }
.drawer-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 0.35rem; }
.drawer-chips { display: flex; flex-wrap: wrap; gap: 0.32rem; }
.chip {
  padding: 0.22rem 0.68rem; border-radius: 99px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-size: 0.7rem;
  font-family: 'Noto Serif TC', serif; cursor: pointer; transition: all 0.15s;
}
.chip.on { border-color: var(--amber-dim); background: var(--amber-glow); color: var(--amber); }
.chip.lock.on { border-color: var(--lock-border); background: var(--lock-bg); color: var(--lock); }

/* ══════════════════════════════
   CRANK BUTTON
══════════════════════════════ */
.crank-wrap {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 0.75rem 1rem 0.65rem;
  background: var(--bg);
}
.crank-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 99px;
  padding: 0.7rem 2.2rem; color: var(--text);
  font-family: 'Noto Serif TC', serif; font-size: 0.92rem;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background 0.15s, transform 0.1s; letter-spacing: 0.08em;
}
.crank-btn:hover { background: #2a251e; }
.crank-btn:active { transform: scale(0.96); }
.crank-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }
.crank-icon { font-size: 1rem; }
.crank-btn.spinning .crank-icon { animation: spin 0.52s ease; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════
   BOTTOM TAB BAR
══════════════════════════════ */
.tab-bar {
  flex-shrink: 0;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 0.85rem 0.2rem 0.7rem;
  background: none; border: none; border-top: 2.5px solid transparent;
  color: var(--text-muted); font-family: 'Noto Serif TC', serif;
  font-size: 0.8rem; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.15s;
  margin-top: -1px; min-height: 52px;
}
.tab-btn.active { color: var(--amber); border-top-color: var(--amber); }

/* ══════════════════════════════
   SETTINGS PAGE (slides in from right)
══════════════════════════════ */
.settings-page {
  position: absolute; inset: 0; background: var(--bg); z-index: 300;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.settings-page.open { transform: translateX(0); }
.settings-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 1.1rem 0.6rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-title { font-size: 0.85rem; letter-spacing: 0.15em; color: var(--amber); }
.settings-body { flex:1; overflow-y:auto; padding: 0.8rem 1rem 2rem; }

/* Filter chips */
.filter-bar { margin-bottom: 0.8rem; display:flex; flex-direction:column; gap:0.4rem; }
.filter-row { display:flex; gap:0.3rem; overflow-x:auto; scrollbar-width:none; }
.filter-row::-webkit-scrollbar { display:none; }
.fchip {
  flex-shrink:0; padding:0.25rem 0.7rem; border-radius:99px;
  border:1px solid var(--border); background:transparent; color:var(--text-muted);
  font-size:0.7rem; font-family:'Noto Serif TC',serif; cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.fchip.on { border-color:var(--amber-dim); background:var(--amber-glow); color:var(--amber); }
.fchip.lock.on { border-color:var(--lock-border); background:var(--lock-bg); color:var(--lock); }

/* Polaroid grid */
.polaroid-grid { columns:2; column-gap:0.6rem; }
.polaroid {
  break-inside:avoid; background:#f5f0e8; border-radius:4px;
  margin-bottom:0.6rem; box-shadow:0 2px 8px rgba(0,0,0,0.3);
  overflow:hidden; cursor:pointer; transition:transform 0.15s; position:relative;
}
.polaroid:active { transform:scale(0.97); }
.polaroid.priv::after { content:'🔒'; position:absolute; top:3px; left:3px; font-size:0.62rem; background:rgba(0,0,0,0.4); border-radius:3px; padding:1px 3px; line-height:1.4; }
.pol-img { width:100%; aspect-ratio:1; background:#e8e0d0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.pol-img img { width:100%; height:100%; object-fit:cover; display:block; }
.pol-quote { background:#faf6ee; padding:0.7rem; min-height:70px; display:flex; align-items:center; }
.pol-quote-txt { font-size:0.72rem; line-height:1.6; color:#3a3020; font-family:'Noto Serif TC',serif; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; }
.pol-vid { width:100%; aspect-ratio:16/10; background:#2a2520; position:relative; overflow:hidden; }
.pol-vid img { width:100%; height:100%; object-fit:cover; }
.pol-vid-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.pol-vid-play::after { content:''; width:0; height:0; border-style:solid; border-width:7px 0 7px 13px; border-color:transparent transparent transparent rgba(255,255,255,0.85); }
.pol-cap { padding:0.38rem 0.5rem 0.42rem; background:#f5f0e8; min-height:24px; }
.pol-heart { font-size:0.76rem; }
.pol-msg { font-size:0.68rem; color:#5a4e3a; margin-left:0.18rem; font-family:'Noto Serif TC',serif; }
.pol-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,0.4); border:none; border-radius:50%; width:19px; height:19px; color:#fff; font-size:0.6rem; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; }
.polaroid:hover .pol-del, .polaroid:active .pol-del { opacity:1; }
.wall-empty { text-align:center; padding:3rem 1rem; color:var(--text-dim); font-size:0.82rem; line-height:1.8; }

/* ══════════════════════════════
   UPLOAD SHEET
══════════════════════════════ */
.sheet-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.65); z-index:400;
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none; transition:opacity 0.22s;
}
.sheet-overlay.open { opacity:1; pointer-events:all; }
.sheet {
  background:var(--surface); border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  width:100%; max-height:88vh; overflow-y:auto;
  padding:1rem 1.1rem 2.2rem;
  transform:translateY(100%); transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.sheet-overlay.open .sheet { transform:translateY(0); }
.sheet.priv-mode { border-top-color:var(--lock); }
.sheet-handle { width:34px; height:3px; background:var(--border); border-radius:2px; margin:0 auto 0.9rem; }
.sheet-title { font-size:0.84rem; letter-spacing:0.1em; color:var(--amber); text-align:center; margin-bottom:0.9rem; }
.sheet-title.priv { color:var(--lock); }

.notice {
  border-radius:9px; padding:0.55rem 0.8rem; margin-bottom:0.8rem;
  font-size:0.76rem; display:flex; align-items:center; gap:6px;
}
.notice.pub { background:var(--amber-glow); border:1px solid var(--amber-dim); color:var(--amber); }
.notice.priv { background:var(--lock-bg); border:1px solid var(--lock-border); color:var(--lock); }

.heart-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.8rem; }
.hbtn {
  width:34px; height:34px; border-radius:50%; border:1.5px solid var(--border);
  background:var(--card); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.hbtn.on { border-color:var(--amber); background:var(--amber-glow); transform:scale(1.1); }

.type-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.42rem; margin-bottom:0.85rem; }
.tbtn {
  background:var(--card); border:1px solid var(--border); border-radius:11px;
  padding:0.6rem 0.1rem; color:var(--text-muted); font-family:'Noto Serif TC',serif;
  font-size:0.65rem; cursor:pointer; text-align:center; transition:all 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:0.18rem;
}
.tbtn .ti { font-size:1.1rem; }
.tbtn.on { border-color:var(--amber); background:var(--amber-glow); color:var(--amber); }

.field { margin-bottom:0.75rem; }
.field label { display:block; font-size:0.7rem; color:var(--text-muted); margin-bottom:0.3rem; letter-spacing:0.05em; }
.field input, .field textarea {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:9px; padding:0.62rem 0.8rem; color:var(--text);
  font-family:'Noto Serif TC',serif; font-size:0.86rem; resize:vertical;
  -webkit-appearance:none; transition:border-color 0.15s;
}
.field input:focus, .field textarea:focus { outline:none; border-color:var(--amber-dim); }
.field textarea { min-height:70px; }
.upload-box {
  border:1.5px dashed var(--border); border-radius:9px;
  padding:1rem; text-align:center; color:var(--text-muted);
  font-size:0.76rem; cursor:pointer; position:relative;
}
.upload-box input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-box-icon { font-size:1.4rem; margin-bottom:0.2rem; opacity:0.45; }
.preview-strip { display:flex; flex-wrap:wrap; gap:5px; margin-top:0.6rem; }
.preview-strip img { height:54px; width:54px; object-fit:cover; border-radius:5px; }
.preview-count { font-size:0.7rem; color:var(--text-muted); margin-top:0.22rem; }

.save-btn {
  width:100%; background:var(--amber); border:none; border-radius:11px;
  padding:0.82rem; color:var(--bg); font-family:'Noto Serif TC',serif;
  font-size:0.9rem; font-weight:600; cursor:pointer; margin-top:0.35rem;
  letter-spacing:0.08em; transition:opacity 0.15s;
}
.save-btn:active { opacity:0.82; }
.save-btn.priv { background:var(--lock); }

/* ══════════════════════════════
   DETAIL MODAL
══════════════════════════════ */
.detail-ov {
  position:absolute; inset:0; background:rgba(0,0,0,0.85); z-index:500;
  display:flex; align-items:center; justify-content:center; padding:1.4rem;
  opacity:0; pointer-events:none; transition:opacity 0.18s;
}
.detail-ov.open { opacity:1; pointer-events:all; }
.detail-card {
  background:#f5f0e8; border-radius:5px; overflow:hidden;
  max-width:320px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transform:scale(0.9); transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.detail-ov.open .detail-card { transform:scale(1); }
.detail-card img { width:100%; display:block; max-height:360px; object-fit:contain; background:#e8e0d0; }
.detail-cap { padding:0.6rem 0.8rem 0.75rem; font-size:0.8rem; color:#5a4e3a; }
.detail-close {
  position:absolute; top:0.8rem; right:0.8rem; background:rgba(0,0,0,0.5);
  border:none; border-radius:50%; width:28px; height:28px;
  color:#fff; font-size:0.85rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ══════════════════════════════
   IDENTITY OVERLAY
══════════════════════════════ */
.id-ov {
  position:absolute; inset:0; background:var(--bg); z-index:600;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:2rem; text-align:center;
}
.id-ov.hidden { display:none; }
.id-title { font-size:1.1rem; letter-spacing:0.2em; color:var(--amber); margin-bottom:0.5rem; }
.id-sub { font-size:0.8rem; color:var(--text-muted); margin-bottom:2.2rem; line-height:1.75; }
.id-hearts { display:flex; gap:1.1rem; flex-wrap:wrap; justify-content:center; margin-bottom:2rem; }
.id-heart {
  width:60px; height:60px; border-radius:50%; border:2px solid var(--border);
  background:var(--card); font-size:1.9rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.id-heart.on { border-color:var(--amber); background:var(--amber-glow); transform:scale(1.1); }
.id-confirm {
  width:100%; max-width:260px; background:var(--amber); border:none;
  border-radius:12px; padding:0.88rem; color:var(--bg);
  font-family:'Noto Serif TC',serif; font-size:0.92rem; font-weight:600;
  cursor:pointer; letter-spacing:0.1em;
}
.id-confirm:disabled { opacity:0.32; cursor:not-allowed; }

/* Toast */
.toast {
  position:absolute; bottom:5rem; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--card); border:1px solid var(--amber-dim);
  color:var(--amber); padding:0.5rem 1.15rem;
  border-radius:99px; font-size:0.77rem;
  opacity:0; transition:all 0.2s; pointer-events:none; white-space:nowrap; z-index:700;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

<!-- Identity -->
<div class="id-ov" id="idOv">
  <div class="id-title">你是誰？✦</div>
  <div class="id-sub">選一個愛心代號<br>之後可以在這裡更換</div>
  <div class="id-hearts">
    <button class="id-heart" data-h="💚" onclick="pickHeart(this)">💚</button>
    <button class="id-heart" data-h="🧡" onclick="pickHeart(this)">🧡</button>
    <button class="id-heart" data-h="💛" onclick="pickHeart(this)">💛</button>
    <button class="id-heart" data-h="🩶" onclick="pickHeart(this)">🩶</button>
    <button class="id-heart" data-h="💙" onclick="pickHeart(this)">💙</button>
  </div>
  <button class="id-confirm" id="idConfirm" disabled onclick="confirmId()">進入能量補給站</button>
</div>

<!-- Settings page -->
<div class="settings-page" id="settingsPage">
  <div class="settings-hdr">
    <div class="settings-title">所有扭蛋</div>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="closeSettings()" title="關閉">⚙️</button>
    </div>
  </div>
  <div class="settings-body">
    <div class="filter-bar">
      <div class="filter-row" id="fType">
        <button class="fchip on" data-f="all" onclick="setTF(this)">全部</button>
        <button class="fchip" data-f="image" onclick="setTF(this)">圖片</button>

<script>
// ── State ──
let myHeart = localStorage.getItem('my_heart') || null;
let items   = JSON.parse(localStorage.getItem('universe_items') || '[]');
let opts    = { 'src-pub':true,'src-priv':true,'t-quote':true,'t-image':true,'t-gif':true,'t-video':true };
let gState  = ['idle','idle','idle']; // idle | capsule | result
let rolls   = [0,0,0];
let curSlide = 0;
let upMode  = 'public';
let upType  = 'image';
let upHeart = null;
let tfilt   = 'all';
let mfilt   = 'all';

const CAPS = [['#f7a8b0','#f0c0c8'],['#a8d4f7','#c0d8f5'],['#a8f0b8','#c0eecb'],['#f0e0a8','#eedfc0'],['#d0a8f0','#e0c8f5'],['#f0c8a8','#f5dcc8']];

// ── Identity ──
function pickHeart(btn) {
  document.querySelectorAll('.id-heart').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  myHeart = btn.dataset.h;
  document.getElementById('idConfirm').disabled = false;
}
function confirmId() {
  localStorage.setItem('my_heart', myHeart);
  document.getElementById('idOv').classList.add('hidden');
  syncHeart();
}
function syncHeart() {
  if (!myHeart) return;
  const nh = document.getElementById('noticeHeart');
  if (nh) nh.textContent = myHeart;
  document.querySelectorAll('#sheetHearts .hbtn').forEach(b=>{
    const on = b.dataset.h === myHeart;
    b.classList.toggle('on', on);
    if (on) upHeart = myHeart;
  });
}

// ── Slide / swipe ──
function slideW() { return document.getElementById('gvp').offsetWidth; }

function initSlides() {
  const app = document.getElementById('app');
  const hdr = document.querySelector('.hdr');
  const drawer = document.getElementById('customDrawer');
  const crankWrap = document.querySelector('.crank-wrap');
  const tabBar = document.querySelector('.tab-bar');
  
  const appH = app.offsetHeight;
  const usedH = hdr.offsetHeight + crankWrap.offsetHeight + tabBar.offsetHeight;
  const drawerH = drawer.classList.contains('open') ? drawer.scrollHeight : 0;
  const vpH = appH - usedH - drawerH;
  
  const vp = document.getElementById('gvp');
  vp.style.height = vpH + 'px';
  
  const w = vp.offsetWidth;
  const track = document.getElementById('gtrack');
  track.style.width = (w * 3) + 'px';
  track.style.height = vpH + 'px';
  document.querySelectorAll('.gacha-slide').forEach(s => {
    s.style.width = w + 'px';
    s.style.height = vpH + 'px';
  });
  track.style.transition = 'none';
}

function goSlide(idx, animate=true) {
  if (idx < 0 || idx > 2) return;
  curSlide = idx;
  const w = slideW();
  const track = document.getElementById('gtrack');
  track.style.transition = animate ? 'transform 0.32s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform = `translateX(-${idx * w}px)`;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  // custom drawer
  document.getElementById('customDrawer').classList.toggle('open', idx===2);
  // update crank
  bindCrank(idx);
}

function initPointer() {
  const vp = document.getElementById('gvp');
  let sx=0, sy=0, dragging=false, moved=false;

  vp.addEventListener('pointerdown', e=>{
    // ignore clicks on interactive elements
    if (e.target.closest('button,a,.capsule')) return;
    sx = e.clientX; sy = e.clientY;
    dragging = true; moved = false;
  });
  vp.addEventListener('pointermove', e=>{
    if (!dragging) return;
    const dx = e.clientX-sx, dy = e.clientY-sy;
    if (!moved && Math.abs(dx)>8) moved=true;
    if (moved && Math.abs(dx)>Math.abs(dy)) e.preventDefault();
  }, {passive:false});
  vp.addEventListener('pointerup', e=>{
    if (!dragging) return;
    dragging = false;
    if (!moved) return;
    const dx = e.clientX-sx;
    if (Math.abs(dx)>44) goSlide(dx<0 ? curSlide+1 : curSlide-1);
  });
  vp.addEventListener('pointercancel', ()=>{ dragging=false; moved=false; });
}

// ── Gacha ──
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function getPool(idx) {
  if (idx===0) return [...items];
  if (idx===1) return items.filter(i=>i.priv || i.heart===myHeart);
  // custom
  let src=[];
  if (opts['src-pub'])  src.push(...items.filter(i=>!i.priv));
  if (opts['src-priv']) src.push(...items.filter(i=>i.priv));
  const types = ['quote','image','gif','video'].filter(t=>opts['t-'+t]);
  return src.filter(i=>types.includes(i.type));
}

function bindCrank(idx) {
  const btn = document.getElementById('crankBtn');
  const lbl = document.getElementById('crankLabel');
  const state = gState[idx];
  btn.disabled = (state === 'capsule');
  if (state === 'result') {
    lbl.textContent = '再轉一顆';
    btn.onclick = () => resetSlide(idx);
  } else {
    lbl.textContent = '轉一顆';
    btn.onclick = () => startGacha(idx);
  }
}

async function startGacha(idx) {
  if (gState[idx] !== 'idle') return;
  const btn = document.getElementById('crankBtn');
  btn.disabled = true;

  // hide previous results
  document.getElementById('rq'+idx).classList.remove('show');
  document.getElementById('rm'+idx).classList.remove('show');
  document.getElementById('ih'+idx).style.display = '';
  document.getElementById('th'+idx).classList.remove('show');
  const cap = document.getElementById('cap'+idx);
  cap.style.display = 'none'; cap.classList.remove('show','drop','pop');

  // spin crank icon
  btn.querySelector('.crank-icon').style.animation='spin 0.52s ease';
  await sleep(540);
  btn.querySelector('.crank-icon').style.animation='';

  // pick color, drop capsule
  const c = CAPS[Math.floor(Math.random()*CAPS.length)];
  document.getElementById('ct'+idx).style.background = c[0];
  document.getElementById('cb'+idx).style.background = c[1];
  document.getElementById('ih'+idx).style.display = 'none';
  cap.style.display='block';
  void cap.offsetWidth;
  cap.classList.add('drop','show');

  gState[idx] = 'capsule';
  await sleep(420);
  document.getElementById('th'+idx).classList.add('show');
  cap.onclick = () => openCap(idx);
  btn.disabled = false;
  bindCrank(idx);
}

async function openCap(idx) {
  if (gState[idx] !== 'capsule') return;
  const cap = document.getElementById('cap'+idx);
  const th  = document.getElementById('th'+idx);
  const btn = document.getElementById('crankBtn');
  const rq  = document.getElementById('rq'+idx);
  const rm  = document.getElementById('rm'+idx);

  th.classList.remove('show');
  btn.disabled = true;
  cap.classList.add('pop');
  await sleep(360);
  cap.style.display='none'; cap.classList.remove('pop','drop','show');

  rolls[idx]++;
  const pool = getPool(idx);

  if (pool.length === 0) {
    // AI quote
    rq.classList.add('show');
    document.getElementById('qc'+idx).innerHTML = `<div class="dot-row"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">AI 挑語錄中…</div>`;
    await fetchAI(idx);
  } else {
    const item = pool[Math.floor(Math.random()*pool.length)];
    showResult(item, idx, rq, rm);
  }

  gState[idx] = 'result';
  btn.disabled = false;
  bindCrank(idx);
}

function showResult(item, idx, rq, rm) {
  if (item.type==='quote') {
    rq.classList.add('show');
    document.getElementById('qc'+idx).innerHTML=`<p class="qtext">${esc(item.text||'')}</p>${item.source?`<p class="qsrc">— ${esc(item.source)}</p>`:''}`;
  } else if (item.type==='image'||item.type==='gif') {
    rm.innerHTML=`<img src="${item.data}" alt="">`;
    rm.classList.add('show');
  } else if (item.type==='video') {
    const th=ytThumb(item.url);
    rm.innerHTML=`<a class="vlink" href="${esc(item.url)}" target="_blank" rel="noopener">
      <div class="vthumb">${th?`<img src="${th}" alt="">`:''}
        <div class="vplay"></div></div>
      <div><div class="vtitle">${esc(item.title||'影片')}</div>
           <div class="vurl">${shortUrl(item.url)}</div></div></a>`;
    rm.classList.add('show');
  }
}

async function fetchAI(idx) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        messages:[{role:'user',content:`請給我一句有力量的正能量語錄，中文，15到50字，附來源。只回傳純JSON不加markdown：{"quote":"語錄","source":"來源"}`}]})
    });
    const d=await res.json();
    const p=JSON.parse(d.content[0].text.trim().replace(/```json|```/g,''));
    document.getElementById('qc'+idx).innerHTML=`<p class="qtext">${p.quote}</p><p class="qsrc">— ${p.source}</p>`;
  } catch {
    const fb=[{quote:'你今天的每一步，都是明天的你謝謝自己的理由。',source:'佚名'},{quote:'不必完美，只要真實。',source:'佚名'},{quote:'繼續前行本身就是一種勇氣。',source:'佚名'}];
    const q=fb[Math.floor(Math.random()*fb.length)];
    document.getElementById('qc'+idx).innerHTML=`<p class="qtext">${q.quote}</p><p class="qsrc">— ${q.source}</p>`;
  }
}

function resetSlide(idx) {
  gState[idx]='idle';
  document.getElementById('rq'+idx).classList.remove('show');
  document.getElementById('rm'+idx).classList.remove('show');
  document.getElementById('th'+idx).classList.remove('show');
  document.getElementById('ih'+idx).style.display='';
  const cap=document.getElementById('cap'+idx);
  cap.style.display='none'; cap.classList.remove('show','drop','pop');
  bindCrank(idx);
}

function togOpt(btn) {
  const k=btn.dataset.k; opts[k]=!opts[k]; btn.classList.toggle('on',opts[k]);
}

// ── Upload ──
function openUpload(mode) {
  upMode = mode||'public';
  resetSheet();
  const isPriv = upMode==='private';
  const sh=document.getElementById('sheetEl');
  const notice=document.getElementById('sheetNotice');
  const title=document.getElementById('sheetTitle');
  const hw=document.getElementById('heartWrap');
  const mw=document.getElementById('msgWrap');
  const sb=document.getElementById('saveBtn');
  if (isPriv) {
    sh.classList.add('priv-mode');
    notice.className='notice priv'; notice.innerHTML='<span>🔒</span><span>私密模式：只存在你的裝置，不對任何人顯示</span>';
    title.className='sheet-title priv'; title.textContent='🔒 補充私密扭蛋';
    hw.style.display='none'; mw.style.display='none';
    sb.className='save-btn priv'; sb.textContent='🔒 儲存為私密';
  } else {
    sh.classList.remove('priv-mode');
    notice.className='notice pub'; notice.innerHTML=`<span>👁</span><span>以 <strong id="noticeHeart">${myHeart||'?'}</strong> 身份上傳，所有人都看得到</span>`;
    title.className='sheet-title'; title.textContent='補充扭蛋';
    hw.style.display=''; mw.style.display='';
    sb.className='save-btn'; sb.textContent='上傳到宇宙';
    syncHeart();
  }
  document.getElementById('sheetOv').classList.add('open');
}

function resetSheet() {
  upType='image';
  document.querySelectorAll('#sheetEl .tbtn').forEach((b,i)=>b.classList.toggle('on',i===0));
  ['ufImage','ufGif','ufVideo','ufQuote'].forEach((id,i)=>document.getElementById(id).style.display=i===0?'':'none');
  ['ufMsg','ufUrl','ufVTitle','ufQText','ufQSrc'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  ['ufImgStrip','ufGifStrip'].forEach(id=>document.getElementById(id).innerHTML='');
  ['ufImgCt','ufGifCt'].forEach(id=>document.getElementById(id).textContent='');
  document.getElementById('ufImg').value='';
  document.getElementById('ufGifF').value='';
}

function setUT(type,btn) {
  upType=type;
  document.querySelectorAll('#sheetEl .tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const map={image:'ufImage',gif:'ufGif',video:'ufVideo',quote:'ufQuote'};
  Object.values(map).forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(map[type]).style.display='';
}

function pickUpHeart(btn) {
  document.querySelectorAll('#sheetHearts .hbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); upHeart=btn.dataset.h;
  const nh=document.getElementById('noticeHeart'); if(nh) nh.textContent=upHeart;
}

function prevMulti(inputId,stripId,ctId) {
  const files=Array.from(document.getElementById(inputId).files);
  const strip=document.getElementById(stripId);
  strip.innerHTML='';
  files.slice(0,6).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{const img=document.createElement('img');img.src=e.target.result;strip.appendChild(img);};
    r.readAsDataURL(f);
  });
  document.getElementById(ctId).textContent=files.length?`已選 ${files.length} 張`:'';
}

function saveItem() {
  const isPriv=upMode==='private';
  if (!isPriv && !upHeart){showToast('請選擇愛心代號');return;}
  const msg=isPriv?'':(document.getElementById('ufMsg').value.trim());
  const heart=isPriv?null:upHeart;

  if (upType==='image'||upType==='gif') {
    const fid=upType==='image'?'ufImg':'ufGifF';
    const files=Array.from(document.getElementById(fid).files);
    if (!files.length){showToast('請選擇檔案');return;}
    let done=0;
    files.forEach(file=>{
      const r=new FileReader();
      r.onload=e=>{
        items.unshift({id:Date.now()+Math.random(),type:upType,data:e.target.result,heart,msg,priv:isPriv});
        if(++done===files.length){persist();finishUp(files.length,isPriv);}
      };
      r.readAsDataURL(file);
    });
  } else if (upType==='video') {
    const url=document.getElementById('ufUrl').value.trim();
    if(!url){showToast('請輸入影片連結');return;}
    const title=document.getElementById('ufVTitle').value.trim()||url;
    items.unshift({id:Date.now(),type:'video',url,title,heart,msg,priv:isPriv});
    persist();finishUp(1,isPriv);
  } else if (upType==='quote') {
    const text=document.getElementById('ufQText').value.trim();
    if(!text){showToast('請輸入語錄');return;}
    const source=document.getElementById('ufQSrc').value.trim();
    items.unshift({id:Date.now(),type:'quote',text,source,heart,msg,priv:isPriv});
    persist();finishUp(1,isPriv);
  }
}
function finishUp(n,isPriv) {
  document.getElementById('sheetOv').classList.remove('open');
  showToast(isPriv?`🔒 已儲存 ${n} 項私密內容`:`已補充 ${n} 顆扭蛋 ✦`);
}
function closeSheetBg(e){if(e.target===document.getElementById('sheetOv'))document.getElementById('sheetOv').classList.remove('open');}

// ── Settings ──
function openSettings(){renderWall();document.getElementById('settingsPage').classList.add('open');}
function closeSettings(){document.getElementById('settingsPage').classList.remove('open');}

function setTF(btn){tfilt=btn.dataset.f;document.querySelectorAll('#fType .fchip').forEach(b=>b.classList.toggle('on',b===btn));renderWall();}
function setMF(btn){mfilt=btn.dataset.m;document.querySelectorAll('#fMember .fchip').forEach(b=>b.classList.toggle('on',b===btn));renderWall();}

function renderWall(){
  let list=[...items];
  if(tfilt!=='all')list=list.filter(i=>i.type===tfilt);
  if(mfilt==='__priv__')list=list.filter(i=>i.priv);
  else if(mfilt!=='all')list=list.filter(i=>!i.priv&&i.heart===mfilt);
  const grid=document.getElementById('polGrid');
  if(!list.length){grid.innerHTML=`<div class="wall-empty">還沒有扭蛋<br>點右上角 ＋ 補充幾顆 ✦</div>`;return;}
  grid.innerHTML=list.map(item=>{
    let inner='';
    if(item.type==='image'||item.type==='gif')inner=`<div class="pol-img"><img src="${item.data}" alt="" loading="lazy"></div>`;
    else if(item.type==='video'){const th=ytThumb(item.url);inner=`<a href="${esc(item.url)}" target="_blank" rel="noopener" style="display:block;text-decoration:none"><div class="pol-vid">${th?`<img src="${th}" alt="">`:''}
      <div class="pol-vid-play"></div></div></a>`;}
    else inner=`<div class="pol-quote"><div class="pol-quote-txt">${esc(item.text||'')}${item.source?`<br><span style="font-size:0.6rem;opacity:0.5">— ${esc(item.source)}</span>`:''}</div></div>`;
    const cap=`<div class="pol-cap"><span class="pol-heart">${item.priv?'🔒':(item.heart||'')}</span><span class="pol-msg">${esc(item.msg||'')}</span></div>`;
    return `<div class="polaroid${item.priv?' priv':''}" onclick="openDetail(${JSON.stringify(item.id)})">
      <button class="pol-del" onclick="event.stopPropagation();delItem(${JSON.stringify(item.id)})">✕</button>
      ${inner}${cap}</div>`;
  }).join('');
}

function openDetail(id){
  const item=items.find(i=>i.id===id);
  if(!item||(item.type!=='image'&&item.type!=='gif'))return;
  document.getElementById('detailCard').innerHTML=`<img src="${item.data}" alt=""><div class="detail-cap">${item.priv?'🔒':(item.heart||'')} ${esc(item.msg||'')}</div>`;
  document.getElementById('detailOv').classList.add('open');
}
function closeDetail(e){if(e.target===document.getElementById('detailOv'))closeDetailBtn();}
function closeDetailBtn(){document.getElementById('detailOv').classList.remove('open');}

function delItem(id){items=items.filter(i=>i.id!==id);persist();renderWall();showToast('已刪除');}

// ── Helpers ──
function persist(){
  try{localStorage.setItem('universe_items',JSON.stringify(items));}
  catch(e){showToast('儲存失敗：裝置空間不足，請刪除一些圖片');}
}
function ytThumb(url){const m=String(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null;}
function shortUrl(u){try{return new URL(u).hostname;}catch{return String(u).slice(0,30);}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

// ── Init ──
window.addEventListener('load',()=>{
  initSlides();
  initPointer();
  goSlide(0,false);
  bindCrank(0);
  if(myHeart){document.getElementById('idOv').classList.add('hidden');syncHeart();}
});
window.addEventListener('resize',()=>{initSlides();goSlide(curSlide,false);});
</script>
</body>
